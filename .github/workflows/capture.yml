name: Daily Screenshot Capture

on:
  schedule:
    - cron: '0 23 * * *'   # 한국 오전 8시 (UTC 23:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        country: [de, au, be, be_fr, fr, it, sec, nl, no, pt, es, se, tr, uk, us]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Capture screenshots
        run: node scripts/capture.js ${{ matrix.country }}

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.country }}
          path: docs/screenshots/
          retention-days: 1

      - name: Upload meta as artifact
        uses: actions/upload-artifact@v4
        with:
          name: meta-${{ matrix.country }}
          path: docs/meta/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: capture

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all screenshots
        uses: actions/download-artifact@v4
        with:
          pattern: screenshots-*
          path: docs/screenshots/
          merge-multiple: true

      - name: Download all meta
        uses: actions/download-artifact@v4
        with:
          pattern: meta-*
          path: docs/meta/
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Merge meta files and update index
        run: |
          TODAY=$(date +%Y-%m-%d)
          node -e "
            const fs = require('fs');
            const path = require('path');
            const metaDir = 'docs/meta';

            // 오늘 날짜의 국가별 파일들을 합쳐서 하나로
            const files = fs.readdirSync(metaDir).filter(f => f.startsWith('${TODAY}-') && f.endsWith('.json'));
            console.log('Found country meta files:', files);
            let merged = [];
            for (const f of files) {
              try {
                const data = JSON.parse(fs.readFileSync(path.join(metaDir, f), 'utf8'));
                merged = [...merged, ...data];
              } catch(e) { console.log('Skip invalid file:', f, e.message); }
            }
            if (merged.length > 0) {
              fs.writeFileSync(path.join(metaDir, '${TODAY}.json'), JSON.stringify(merged, null, 2));
              console.log('Merged', files.length, 'files →', '${TODAY}.json');
            } else {
              console.log('No country meta files found for today');
            }

            // index.json 업데이트
            const indexPath = path.join(metaDir, 'index.json');
            let idx = fs.existsSync(indexPath) ? JSON.parse(fs.readFileSync(indexPath, 'utf8')) : [];
            if (!idx.includes('${TODAY}')) { idx.unshift('${TODAY}'); }
            idx.sort((a, b) => b.localeCompare(a));
            fs.writeFileSync(indexPath, JSON.stringify(idx, null, 2));
            console.log('index.json updated:', idx.slice(0, 5));
          "

      - name: Install dependencies
        run: npm install

      - name: Delete old screenshots (7 days)
        run: node scripts/cleanup.js

      - name: Generate dashboard
        run: node scripts/generate-dashboard.js

      - name: Commit and push
        run: |
          git config user.name "Screenshot Bot"
          git config user.email "bot@github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Daily capture: $(date +%Y-%m-%d)"
          git push

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./docs --project-name=samsung-monitor --branch=main
