name: Daily Screenshot Capture

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  capture:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        country: [de, au, be, be_fr, fr, it, sec, nl, no, pt, es, se, tr, uk, us]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Capture screenshots
        run: node scripts/capture.js ${{ matrix.country }}

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.country }}
          path: docs/screenshots/
          retention-days: 1

      - name: Upload meta as artifact
        uses: actions/upload-artifact@v4
        with:
          name: meta-${{ matrix.country }}
          path: docs/meta/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: capture

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download all screenshots
        uses: actions/download-artifact@v4
        with:
          pattern: screenshots-*
          path: docs/screenshots/
          merge-multiple: true

      - name: Download all meta
        uses: actions/download-artifact@v4
        with:
          pattern: meta-*
          path: docs/meta/
          merge-multiple: true

      - name: Update date index
        run: |
          TODAY=$(date +%Y-%m-%d)
          INDEX="docs/meta/index.json"
          if [ ! -f "$INDEX" ]; then echo "[]" > "$INDEX"; fi
          node -e "
            const fs = require('fs');
            const idx = JSON.parse(fs.readFileSync('$INDEX', 'utf8'));
            if (!idx.includes('$TODAY')) { idx.unshift('$TODAY'); }
            idx.sort((a,b) => b.localeCompare(a));
            fs.writeFileSync('$INDEX', JSON.stringify(idx, null, 2));
          "

      - name: Install dependencies
        run: npm install

      - name: Delete old screenshots (30 days)
        run: node scripts/cleanup.js

      - name: Generate dashboard
        run: node scripts/generate-dashboard.js

      - name: Commit and push
        run: |
          git config user.name "Screenshot Bot"
          git config user.email "bot@github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Daily capture: $(date +%Y-%m-%d)"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
